name: Validate Aura workbook

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run workbook validation
        run: |
          pytest -q
          pytest -ra
          
      - name: Show workbook validation report (if present)
        if: always()
        run: |
              python -c "from src.file_loader import validate_workbook; import json; ok, r = validate_workbook('data/Aura.xlsx'); print(json.dumps(r, indent=2))"
        # If you need to manipulate the Excel file, do it via -c (command), not -i (interactive)
            python -c "import pandas as pd; writer = pd.ExcelWriter('data/Aura.xlsx', engine='openpyxl', mode='a', if_sheet_exists='replace'); writer.close()"
